name: VRT Pullback Alert

on:
  schedule:
    # Runs every 15 min, Mon–Fri, 13:30–20:45 UTC (= 9:30 AM–4:45 PM ET)
    - cron: "*/15 13-20 * * 1-5"
    - cron: "45 20 * * 1-5"   # catches the 4:45 PM ET window
  workflow_dispatch:           # allows manual trigger from GitHub UI

jobs:
  check-vrt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance requests

      - name: Run VRT pullback check
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python check_vrt.py
